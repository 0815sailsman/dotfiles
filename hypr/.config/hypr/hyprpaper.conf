# Default wallpaper for all monitors (empty monitor value = fallback)
wallpaper {
    monitor =
    path = ~/wallpaper.png
    fit_mode = cover
}

# If you want to set a specific wallpaper for a second monitor, use a separate block:
# wallpaper {
#     monitor = HDMI-A-1
#     path = ~/other_image.png
#     fit_mode = cover
# }

# Enable splash text rendering over the wallpaper
splash = true

# Fully disable IPC (set to false to disable)
# ipc = false
